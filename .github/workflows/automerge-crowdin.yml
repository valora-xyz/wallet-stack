name: Automerge Crowdin

on:
  workflow_dispatch:
  # At 02:00 (UTC) daily
  # https://crontab.guru/#0_2_*_*_*
  schedule:
    - cron: '0 2 * * *'

jobs:
  automerge-crowdin-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate Valora Actions Token
        id: valora-actions-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.VALORA_ACTIONS_APP_ID }}
          private-key: ${{ secrets.VALORA_ACTIONS_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        with:
          github-token: ${{ steps.valora-actions-token.outputs.token }}
          script: |
            const script = require('.github/scripts/automergeCrowdinPr.js')
            await script({github, context, core})
